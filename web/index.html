<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>綠電媒合平台</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Ccircle cx='12' cy='12' r='11' fill='%234C6EF5'/%3E%3Ccircle cx='12' cy='12' r='2' fill='white'/%3E%3C/svg%3E">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <aside class="rail">
      <div class="brand">
        <span class="mark" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none"><path d="M12 12 4.4 8.6c-.5-.2-.6-.9-.2-1.3A7 7 0 0 1 15 6.7c.4.4.2 1-.3 1.2L12 12Z" fill="#fff"/><path d="M12 12 15 20c.2.5-.1 1.1-.7 1.1A7 7 0 0 1 4.9 15c-.2-.6.3-1 .9-.8L12 12Z" fill="#fff" opacity=".82"/><path d="M12 12l7.5-2.2c.6-.2 1.1.3 1 .9a7 7 0 0 1-6.4 5.8c-.6 0-1-.6-.7-1.1L12 12Z" fill="#fff" opacity=".62"/><circle cx="12" cy="12" r="1.7" fill="#fff"/></svg>
        </span>
        <span><b>綠電媒合平台</b><em>ENERGY&nbsp;MATCHING</em></span>
      </div>
      <nav class="nav" id="nav">
        <div class="lbl">總覽</div>
        <a data-route="overview"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>總覽</a>
        <div class="lbl">資料管理</div>
        <a data-route="farms"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><rect x="3" y="4" width="18" height="14" rx="2"/><path d="M3 9h18M8 18v3M16 18v3"/></svg>發電案場</a>
        <a data-route="customers"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><rect x="4" y="3" width="16" height="18" rx="1"/><path d="M9 21V9h6v12M9 7h.01M15 7h.01"/></svg>企業客戶</a>
        <a data-route="contracts"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><rect x="4" y="3" width="16" height="18" rx="2"/><path d="M8 8h8M8 12h8M8 16h5"/></svg>綠電合約</a>
        <div class="lbl">媒合評估</div>
        <a data-route="evaluate"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><rect x="4" y="3" width="16" height="18" rx="2"/><path d="M8 7h8M8 11h8M8 15h5"/></svg>售電評估</a>
        <a data-route="investment"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M4 19V5M4 19h16M8 15l3-4 3 3 4-6"/></svg>投資效益</a>
        <div class="lbl">監控 / 結算</div>
        <a data-route="live"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>即時再生能源</a>
        <a class="off"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M6 3h9l3 3v15H6z"/><path d="M9 12h6M9 16h6"/></svg>轉供結算<span class="tag">P5</span></a>
      </nav>
      <div class="foot">© 2026 綠電媒合平台 · 靜態 SPA</div>
    </aside>

    <div class="main">
      <div class="topbar">
        <div class="crumb"><span>首頁</span>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 6l6 6-6 6"/></svg>
          <b id="crumb-page">售電評估工具</b></div>
        <span class="databadge" id="dataBadge" tabindex="0"></span>
        <div class="spacer"></div>
        <button class="iconbtn" id="themeBtn" title="切換主題"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 12.8A8.5 8.5 0 1 1 11.2 3a6.6 6.6 0 0 0 9.8 9.8Z"/></svg></button>
        <button class="iconbtn" title="說明"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="9"/><path d="M9.5 9.5a2.5 2.5 0 0 1 4 2c0 1.5-2 1.8-2 3M12 17h.01"/></svg></button>
      </div>

      <main class="content" id="view"><!-- rendered by app.js --></main>
    </div>
  </div>

  <div class="overlay" id="overlay">
    <div class="modal" role="status" aria-live="polite">
      <div class="spin"><b><svg viewBox="0 0 24 24" fill="none"><path d="M12 12 4.4 8.6c-.5-.2-.6-.9-.2-1.3A7 7 0 0 1 15 6.7c.4.4.2 1-.3 1.2L12 12Z" fill="var(--brand)"/><path d="M12 12 15 20c.2.5-.1 1.1-.7 1.1A7 7 0 0 1 4.9 15c-.2-.6.3-1 .9-.8L12 12Z" fill="var(--brand)" opacity=".7"/><path d="M12 12l7.5-2.2c.6-.2 1.1.3 1 .9a7 7 0 0 1-6.4 5.8c-.6 0-1-.6-.7-1.1L12 12Z" fill="var(--brand)" opacity=".5"/></svg></b></div>
      <h3 id="modal-title">正在求解最佳綠電組合…</h3>
      <div class="mbar"><i></i></div>
      <p>MILP 全域最佳化 · 逐時段媒合 · 約束檢查</p>
    </div>
  </div>

  <script src="api.js"></script>
  <script src="app.js"></script>
</body>
</html>
