# Render Blueprint — deploys the FastAPI service (API + static SPA at /app) from the Dockerfile.
#
# Database: bring your own PostgreSQL via DATABASE_URL (Neon recommended — see
# docs/deployment.md), OR uncomment the `databases:` block at the bottom to use
# Render's managed Postgres instead.
#
# Docs: https://render.com/docs/blueprint-spec

services:
  # ---- FastAPI backend -------------------------------------------------------
  - type: web
    name: emp-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    region: singapore          # closest Render region to Taiwan
    plan: free                 # free web services sleep after ~15 min idle
    healthCheckPath: /health
    # Run migrations, then start the server on Render's injected $PORT.
    # (A start script avoids dockerCommand shell-quoting pitfalls with `&&`.)
    dockerCommand: sh scripts/start-api.sh
    envVars:
      - key: DATABASE_URL
        sync: false            # Neon DIRECT endpoint (no `-pooler`): postgresql+psycopg://USER:PASS@ep-xxx.REGION.aws.neon.tech/DB?sslmode=require  (pooler drops SNI on Render's IP-based egress → "database does not exist")
      - key: ENVIRONMENT
        value: production
      # --- Alternative: use Render Postgres instead of Neon (see block below) ---
      # - key: DATABASE_URL
      #   fromDatabase:
      #     name: emp-postgres
      #     property: connectionString

# ---- Optional: Render-managed Postgres (instead of Neon) ---------------------
# Uncomment this block AND the `fromDatabase` env var above to use it.
# NOTE: Render's free Postgres is deleted 90 days after creation — for a durable
# free demo, Neon is the better choice.
# databases:
#   - name: emp-postgres
#     plan: free
#     region: singapore
