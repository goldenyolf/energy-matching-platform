<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>綠電媒合儀表板 · Energy Matching Platform</title>
  <style>
    :root {
      color-scheme: light;
      --surface-1: #fcfcfb;
      --page: #f9f9f7;
      --text-primary: #0b0b0b;
      --text-secondary: #52514e;
      --muted: #898781;
      --grid: #e1e0d9;
      --baseline: #c3c2b7;
      --border: rgba(11, 11, 11, 0.10);
      --series-1: #2a78d6;   /* 藍：分配量 / 序列 */
      --track: #ecebe6;      /* 空白軌道 */
      --good: #0ca30c;       /* 達標 */
      --critical: #d03b3b;   /* 缺口 / 未達 */
      --sans: system-ui, -apple-system, "Segoe UI", "PingFang TC",
              "Microsoft JhengHei", sans-serif;
    }
    :root[data-theme="dark"], :root.dark {
      color-scheme: dark;
      --surface-1: #1a1a19;
      --page: #0d0d0d;
      --text-primary: #ffffff;
      --text-secondary: #c3c2b7;
      --muted: #898781;
      --grid: #2c2c2a;
      --baseline: #383835;
      --border: rgba(255, 255, 255, 0.10);
      --series-1: #3987e5;
      --track: #262625;
      --good: #0ca30c;
      --critical: #e06060;
    }
    @media (prefers-color-scheme: dark) {
      :root:not([data-theme="light"]) {
        color-scheme: dark;
        --surface-1: #1a1a19; --page: #0d0d0d;
        --text-primary: #ffffff; --text-secondary: #c3c2b7;
        --grid: #2c2c2a; --baseline: #383835;
        --border: rgba(255, 255, 255, 0.10);
        --series-1: #3987e5; --track: #262625; --critical: #e06060;
      }
    }

    * { box-sizing: border-box; }
    body {
      margin: 0; background: var(--page); color: var(--text-primary);
      font-family: var(--sans); line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }
    .wrap { max-width: 1040px; margin: 0 auto; padding: 32px 20px 64px; }

    header { display: flex; align-items: flex-start; gap: 16px; margin-bottom: 28px; }
    header .title { flex: 1; }
    h1 { font-size: 22px; margin: 0 0 4px; letter-spacing: -0.01em; }
    .subtitle { color: var(--text-secondary); font-size: 14px; margin: 0; }
    .theme-btn {
      border: 1px solid var(--border); background: var(--surface-1);
      color: var(--text-secondary); border-radius: 8px; padding: 7px 12px;
      font-family: inherit; font-size: 13px; cursor: pointer; white-space: nowrap;
    }
    .theme-btn:hover { color: var(--text-primary); }

    /* KPI 卡片 */
    .kpis {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px; margin-bottom: 32px;
    }
    .kpi {
      background: var(--surface-1); border: 1px solid var(--border);
      border-radius: 12px; padding: 16px 18px;
    }
    .kpi .label { font-size: 12px; color: var(--muted); margin-bottom: 8px; }
    .kpi .value {
      font-size: 28px; font-weight: 600; letter-spacing: -0.02em;
      font-variant-numeric: tabular-nums;
    }
    .kpi .unit { font-size: 14px; font-weight: 500; color: var(--text-secondary); margin-left: 3px; }
    .kpi .sub { font-size: 12px; color: var(--text-secondary); margin-top: 4px; }

    section { margin-bottom: 36px; }
    h2 { font-size: 15px; margin: 0 0 14px; letter-spacing: -0.01em; }
    h2 .hint { font-weight: 400; color: var(--muted); font-size: 12px; margin-left: 8px; }

    .card {
      background: var(--surface-1); border: 1px solid var(--border);
      border-radius: 12px; padding: 8px 20px 16px;
    }

    /* 條列 bar */
    .row {
      display: grid; grid-template-columns: 148px 1fr 132px;
      align-items: center; gap: 14px; padding: 12px 0;
      border-bottom: 1px solid var(--grid);
    }
    .row:last-child { border-bottom: none; }
    .row .name { font-size: 13.5px; font-weight: 500; }
    .row .name small { display: block; color: var(--muted); font-weight: 400; font-size: 11.5px; }

    .track {
      position: relative; height: 22px; background: var(--track);
      border-radius: 5px; overflow: visible;
    }
    .fill {
      position: absolute; left: 0; top: 0; bottom: 0; border-radius: 5px;
      min-width: 3px; transition: width .5s ease;
    }
    .fill.met { background: var(--good); }
    .fill.gap { background: var(--series-1); }
    .fill.seq { background: var(--series-1); }
    /* RE 目標標記線 */
    .target {
      position: absolute; top: -3px; bottom: -3px; width: 2px;
      background: var(--critical); border-radius: 1px;
    }
    .target::after {
      content: attr(data-label); position: absolute; top: -15px; left: 50%;
      transform: translateX(-50%); font-size: 10px; color: var(--critical);
      white-space: nowrap;
    }

    .metric {
      text-align: right; font-variant-numeric: tabular-nums;
    }
    .metric .pct { font-size: 15px; font-weight: 600; }
    .metric .note { font-size: 11.5px; color: var(--text-secondary); }
    .badge {
      display: inline-block; font-size: 11px; padding: 1px 7px; border-radius: 999px;
      font-weight: 600;
    }
    .badge.met { color: var(--good); background: color-mix(in srgb, var(--good) 14%, transparent); }
    .badge.miss { color: var(--critical); background: color-mix(in srgb, var(--critical) 14%, transparent); }

    .legend { display: flex; gap: 18px; margin: 4px 0 14px; font-size: 12px; color: var(--text-secondary); flex-wrap: wrap; }
    .legend span { display: inline-flex; align-items: center; gap: 6px; }
    .swatch { width: 12px; height: 12px; border-radius: 3px; display: inline-block; }
    .swatch.tline { width: 2px; height: 13px; border-radius: 1px; background: var(--critical); }

    footer { color: var(--muted); font-size: 12px; margin-top: 40px; border-top: 1px solid var(--grid); padding-top: 16px; }
    footer a { color: var(--series-1); text-decoration: none; }
    .state { padding: 60px 0; text-align: center; color: var(--muted); }

    @media (max-width: 560px) {
      .row { grid-template-columns: 96px 1fr; }
      .row .metric { grid-column: 2; text-align: left; padding-left: 0; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="title">
        <h1>綠電媒合儀表板</h1>
        <p class="subtitle">Energy Matching Platform · 台灣企業綠電交易 (CPPA) 比例分配與 RE 目標分析</p>
      </div>
      <button class="theme-btn" id="themeBtn" type="button">切換深/淺色</button>
    </header>

    <div id="content"><div class="state">載入中…</div></div>

    <footer>
      資料為作品集示意值（改編自公開資訊），非真實合約或即時電網資料。
      API：<a href="/docs">/docs</a> · <a href="/match">/match</a>
    </footer>
  </div>

  <script>
    // ---- 主題切換 -------------------------------------------------------
    const root = document.documentElement;
    const saved = localStorage.getItem("emp-theme");
    if (saved) root.setAttribute("data-theme", saved);
    document.getElementById("themeBtn").addEventListener("click", () => {
      const isDark = getComputedStyle(root).colorScheme.includes("dark");
      const next = isDark ? "light" : "dark";
      root.setAttribute("data-theme", next);
      localStorage.setItem("emp-theme", next);
    });

    // ---- 格式化 ---------------------------------------------------------
    const gwh = (mwh) => (mwh / 1000).toLocaleString("en-US", { maximumFractionDigits: 1 });
    const pct = (r) => (r * 100).toLocaleString("en-US", { maximumFractionDigits: 0 }) + "%";
    const el = (tag, cls, html) => { const e = document.createElement(tag); if (cls) e.className = cls; if (html != null) e.innerHTML = html; return e; };

    // ---- KPI ------------------------------------------------------------
    function kpiCard(label, value, unit, sub) {
      const c = el("div", "kpi");
      c.append(el("div", "label", label));
      const v = el("div", "value", value);
      if (unit) v.append(el("span", "unit", unit));
      c.append(v);
      if (sub) c.append(el("div", "sub", sub));
      return c;
    }

    // ---- 企業 RE bar ----------------------------------------------------
    function companyRow(c) {
      const row = el("div", "row");
      row.append(el("div", "name", `${c.name}<small>用電 ${gwh(c.annual_consumption_mwh)} GWh</small>`));

      const track = el("div", "track");
      const coverage = Math.min(c.coverage_ratio, 1);           // 覆蓋率 (佔用電量)
      const fill = el("div", "fill " + (c.target_met ? "met" : "gap"));
      fill.style.width = (coverage * 100).toFixed(1) + "%";
      track.append(fill);

      if (c.re_target_ratio > 0 && c.re_target_ratio <= 1) {    // RE 目標標記
        const t = el("div", "target");
        t.style.left = `calc(${(c.re_target_ratio * 100).toFixed(1)}% - 1px)`;
        t.setAttribute("data-label", "RE " + pct(c.re_target_ratio));
        track.append(t);
      }
      row.append(track);

      const m = el("div", "metric");
      m.append(el("div", "pct", pct(c.coverage_ratio)));
      m.append(el("div", "note",
        c.target_met
          ? '<span class="badge met">達標</span>'
          : `<span class="badge miss">缺口</span> ${gwh(c.target_gap_mwh)} GWh`));
      row.append(m);
      return row;
    }

    // ---- 風場利用 bar ---------------------------------------------------
    function farmRow(f) {
      const row = el("div", "row");
      row.append(el("div", "name", `${f.name.replace(/\s*\(.*\)/, "")}<small>年發電 ${gwh(f.annual_generation_mwh)} GWh</small>`));
      const track = el("div", "track");
      const fill = el("div", "fill seq");
      fill.style.width = (f.utilization_ratio * 100).toFixed(1) + "%";
      track.append(fill);
      row.append(track);
      const m = el("div", "metric");
      m.append(el("div", "pct", pct(f.utilization_ratio)));
      m.append(el("div", "note", `剩餘 ${gwh(f.surplus_mwh)} GWh`));
      row.append(m);
      return row;
    }

    // ---- 渲染 -----------------------------------------------------------
    function render(data) {
      const s = data.summary;
      const content = document.getElementById("content");
      content.textContent = "";

      const kpis = el("div", "kpis");
      kpis.append(kpiCard("總發電量", gwh(s.total_generation_mwh), "GWh"));
      kpis.append(kpiCard("已媒合綠電", gwh(s.total_allocated_mwh), "GWh", `剩餘 ${gwh(s.total_surplus_mwh)} GWh`));
      kpis.append(kpiCard("綠電利用率", pct(s.utilization_ratio), ""));
      kpis.append(kpiCard("達標企業", `${s.companies_meeting_target}`, `/ ${s.company_count}`, "達成 RE 目標"));
      kpis.append(kpiCard("RE 目標總缺口", gwh(s.total_target_gap_mwh), "GWh"));
      content.append(kpis);

      // 企業區塊
      const secC = el("section");
      secC.append(el("h2", null, '企業 RE 目標分析 <span class="hint">綠電覆蓋率 vs. RE 目標</span>'));
      const legend = el("div", "legend");
      legend.innerHTML =
        '<span><i class="swatch" style="background:var(--good)"></i>已達標覆蓋率</span>' +
        '<span><i class="swatch" style="background:var(--series-1)"></i>未達標覆蓋率</span>' +
        '<span><i class="swatch tline"></i>RE 目標</span>';
      secC.append(legend);
      const cardC = el("div", "card");
      data.company_results.forEach((c) => cardC.append(companyRow(c)));
      secC.append(cardC);
      content.append(secC);

      // 風場區塊
      const secF = el("section");
      secF.append(el("h2", null, '風場利用情形 <span class="hint">已媒合 / 年發電量</span>'));
      const cardF = el("div", "card");
      data.wind_farm_results
        .slice()
        .sort((a, b) => b.utilization_ratio - a.utilization_ratio)
        .forEach((f) => cardF.append(farmRow(f)));
      secF.append(cardF);
      content.append(secF);
    }

    fetch("/match")
      .then((r) => { if (!r.ok) throw new Error("HTTP " + r.status); return r.json(); })
      .then(render)
      .catch((e) => {
        document.getElementById("content").innerHTML =
          `<div class="state">無法載入資料：${e.message}<br>請先啟動 API：<code>uvicorn app.main:app --reload</code></div>`;
      });
  </script>
</body>
</html>
